name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ─── Linux: lint, format, test (non-Windows code paths) ───
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (Linux)
        run: cargo clippy --all-targets
      - name: Test (Linux)
        run: cargo test

  # ─── Windows: build + test matrix (x64, x86) × (debug, release) ───
  #
  # The release x64 job additionally runs an offset-finder smoke test
  # against the runner's own C:\Windows\System32\termsrv.dll — that
  # exercises the pattern-matching pipeline on a real, current Windows
  # build (hosted runner image ships Server 2022, 10.0.20348.x).
  build-windows:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
        profile:
          - debug
          - release
        # Additional row: pin one extra release x64 build to windows-2025 so
        # the offset-finder smoke test also hits a Server 2025 termsrv.dll
        # alongside whatever windows-latest currently maps to (Server 2022
        # as of 2026-Q2). Two distinct Windows lines without doubling the
        # whole matrix. Server 2019 coverage used to live here, but that
        # image was retired by GitHub Actions on 2025-06-30 — using it now
        # hangs jobs in the queue indefinitely.
        include:
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            profile: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.profile }}

      - name: Build (${{ matrix.profile }})
        run: |
          $args = @("build", "--target", "${{ matrix.target }}")
          if ("${{ matrix.profile }}" -eq "release") { $args += "--release" }
          cargo @args

      - name: Clippy (${{ matrix.target }})
        run: cargo clippy --target ${{ matrix.target }} --all-targets

      - name: Test (${{ matrix.target }})
        run: cargo test --target ${{ matrix.target }}

      # ── DLL export verification (release only) ──
      #
      # Uses llvm-readobj from rustup's llvm-tools-preview component so the
      # check doesn't depend on MSVC's dumpbin.exe being on PATH (the
      # windows-latest runner ships MSVC but the dev shell isn't sourced).
      - name: Install llvm-tools
        if: matrix.profile == 'release'
        run: rustup component add llvm-tools-preview

      - name: Verify DLL exports
        if: matrix.profile == 'release'
        shell: pwsh
        run: |
          $base = "target/${{ matrix.target }}/release"

          # Determine expected arch from target + locate llvm-readobj
          if ("${{ matrix.target }}" -like "x86_64*") {
            $expectedArch = "x64"
            $archPattern = "IMAGE_FILE_MACHINE_AMD64"
          } else {
            $expectedArch = "x86"
            $archPattern = "IMAGE_FILE_MACHINE_I386"
          }

          # llvm-tools is a host component — always under the host triple,
          # regardless of what we're cross-compiling to.
          $sysroot = (& rustc --print sysroot).Trim()
          $hostTriple = (& rustc -vV | Select-String "^host: ").ToString().Split()[1]
          $readobj = Join-Path $sysroot "lib/rustlib/$hostTriple/bin/llvm-readobj.exe"
          if (!(Test-Path $readobj)) {
            Write-Error "llvm-readobj.exe not found at $readobj"
            exit 1
          }

          function Assert-Export($dll, $name) {
            $out = & $readobj --coff-exports $dll | Out-String
            if ($out -notmatch [regex]::Escape($name)) {
              Write-Error "$dll missing $name export"
              exit 1
            }
          }

          # --- TermWrap ---
          $dll = "$base/termwrap_dll.dll"
          if (!(Test-Path $dll)) { Write-Error "termwrap_dll.dll not found"; exit 1 }
          Assert-Export $dll "ServiceMain"
          Assert-Export $dll "SvchostPushServiceGlobals"
          Write-Host "termwrap_dll.dll exports: OK"

          # --- EndpWrap ---
          $dll = "$base/endpwrap_dll.dll"
          if (!(Test-Path $dll)) { Write-Error "endpwrap_dll.dll not found"; exit 1 }
          Assert-Export $dll "GetTSAudioEndpointEnumeratorForSession"
          Assert-Export $dll "DllGetClassObject"
          Assert-Export $dll "DllCanUnloadNow"
          Write-Host "endpwrap_dll.dll exports: OK"

          # --- UmWrap (no managed exports — DllMain only) ---
          $dll = "$base/umwrap_dll.dll"
          if (!(Test-Path $dll)) { Write-Error "umwrap_dll.dll not found"; exit 1 }
          Write-Host "umwrap_dll.dll exists: OK"

          # --- Verify PE architecture ---
          foreach ($name in @("termwrap_dll.dll", "endpwrap_dll.dll", "umwrap_dll.dll")) {
            $info = & $readobj --file-headers "$base/$name" | Out-String
            if ($info -notmatch [regex]::Escape($archPattern)) {
              Write-Error "$name is not $expectedArch (expected $archPattern)"
              exit 1
            }
          }
          Write-Host "PE architecture ($expectedArch): OK"

          # --- DLL file size sanity check (must be > 10KB, < 5MB) ---
          foreach ($name in @("termwrap_dll.dll", "endpwrap_dll.dll", "umwrap_dll.dll")) {
            $size = (Get-Item "$base/$name").Length
            if ($size -lt 10240) {
              Write-Error "$name is suspiciously small ($size bytes)"
              exit 1
            }
            if ($size -gt 5242880) {
              Write-Error "$name is suspiciously large ($size bytes)"
              exit 1
            }
            Write-Host "$name size: $([math]::Round($size/1024))KB OK"
          }

      # ── Smoke test: run offset-finder against the runner's own
      # termsrv.dll (windows-latest is Server 2022, 10.0.20348.x). Exercises
      # the runtime pattern-matching pipeline end-to-end on a real, current
      # Windows build — the closest thing to an integration test that a
      # hosted runner can provide. x64 only: the runner is 64-bit, so
      # System32 only holds the native image.
      - name: Smoke test offset-finder vs system termsrv.dll
        if: matrix.profile == 'release' && matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $exe = "target/${{ matrix.target }}/release/offset-finder.exe"
          if (!(Test-Path $exe)) {
            Write-Error "offset-finder.exe not found"
            exit 1
          }
          & $exe --assert-all "$env:SystemRoot\System32\termsrv.dll"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "offset-finder --assert-all failed (exit $LASTEXITCODE)"
            exit 1
          }

      # ── Verify installer binary exists (release only) ──
      - name: Verify installer binary
        if: matrix.profile == 'release'
        shell: pwsh
        run: |
          $base = "target/${{ matrix.target }}/release"
          $exe = "$base/rdprrap-installer.exe"
          if (!(Test-Path $exe)) {
            Write-Error "rdprrap-installer.exe not found at $exe"
            exit 1
          }
          # Sanity check: --help and --version should exit 0.
          & $exe --help | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Error "rdprrap-installer --help failed (exit $LASTEXITCODE)"
            exit 1
          }
          & $exe --version | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Error "rdprrap-installer --version failed (exit $LASTEXITCODE)"
            exit 1
          }
          Write-Host "rdprrap-installer.exe: OK"

      # ── Verify rdprrap-check / rdprrap-conf scaffolds exist (release only) ──
      - name: Verify check + conf binaries
        if: matrix.profile == 'release'
        shell: pwsh
        run: |
          $base = "target/${{ matrix.target }}/release"
          foreach ($name in @("rdprrap-check.exe", "rdprrap-conf.exe")) {
            $exe = "$base/$name"
            if (!(Test-Path $exe)) {
              Write-Error "$name not found at $exe"
              exit 1
            }
            Write-Host "${name}: OK"
          }

      # ── Upload release artifacts ──
      - name: Upload artifacts
        if: matrix.profile == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: rdprrap-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/*.dll
            target/${{ matrix.target }}/release/offset-finder.exe
            target/${{ matrix.target }}/release/rdprrap-installer.exe
            target/${{ matrix.target }}/release/rdprrap-check.exe
            target/${{ matrix.target }}/release/rdprrap-conf.exe

  # ─── cargo-deny: license + banned-deps + source-registry policy gate ───
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Enforce deny.toml policy
        run: cargo deny check

  # ─── Dependency audit (gate: runs on every push + PR, parallel with build) ───
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit workspace dependencies (deny warnings)
        run: cargo audit --deny warnings

  # ─── Bytecode verification test ───
  bytecode-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run bytecode + disassembly tests
        run: cargo test -p patcher -- --nocapture
      - name: Verify no Mnemonic::Jz/Jnz in source
        run: |
          if grep -rn 'Mnemonic::Jz\b\|Mnemonic::Jnz\b' crates/; then
            echo "ERROR: Found invalid Mnemonic::Jz or Mnemonic::Jnz (use Je/Jne)"
            exit 1
          fi
          echo "No invalid mnemonic references found: OK"
      - name: Verify SAFETY comments on all unsafe blocks
        run: |
          # Find unsafe blocks without a preceding SAFETY comment (within 2 lines)
          count=0
          while IFS= read -r file; do
            if grep -n 'unsafe {' "$file" | while read -r line; do
              lineno=$(echo "$line" | cut -d: -f1)
              # Check the 3 lines before the unsafe block for SAFETY comment
              start=$((lineno > 3 ? lineno - 3 : 1))
              context=$(sed -n "${start},${lineno}p" "$file")
              if ! echo "$context" | grep -qi 'SAFETY'; then
                echo "WARNING: $file:$lineno — unsafe block without SAFETY comment"
                count=$((count + 1))
              fi
            done; then true; fi
          done < <(find crates/ -name '*.rs' -not -path '*/target/*')
          # Non-blocking: just report, don't fail (some unsafe blocks inherit safety from caller)
          echo "Unsafe blocks without nearby SAFETY comment: $count"
